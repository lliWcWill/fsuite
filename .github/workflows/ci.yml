name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-suite:
    name: test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FSUITE_TELEMETRY: '3'
      FSUITE_TEST_ARTIFACT_DIR: ${{ github.workspace }}/test-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree ripgrep fd-find sqlite3

      - name: Install MCP test dependencies
        run: npm ci --prefix mcp

      - name: Run fsuite test suite
        run: bash tests/run_all_tests.sh

      - name: Upload test diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fsuite-test-diagnostics
          path: test-artifacts
          if-no-files-found: ignore
