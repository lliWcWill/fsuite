name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-suite:
    name: test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FSUITE_TELEMETRY: '3'
      FSUITE_TEST_ARTIFACT_DIR: ${{ github.workspace }}/test-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree ripgrep fd-find sqlite3 \
            poppler-utils python3-pil
          # Optional but recommended PDF backend (Phase 5+ media tests prefer it)
          # Use sudo + --break-system-packages so the user that runs the test
          # suite can `import fitz` from system Python without --user path quirks.
          sudo python3 -m pip install --quiet --break-system-packages pymupdf || true

      - name: Install MCP test dependencies
        run: npm ci --prefix mcp

      - name: Run fsuite test suite
        run: bash tests/run_all_tests.sh

      - name: Upload test diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fsuite-test-diagnostics
          path: test-artifacts
          if-no-files-found: ignore
