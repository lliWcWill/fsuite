name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-suite:
    name: test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FSUITE_TELEMETRY: '3'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree ripgrep fd-find sqlite3

      - name: Install MCP test dependencies
        run: npm ci --prefix mcp

      - name: Run fsuite test suite
        run: bash tests/run_all_tests.sh
