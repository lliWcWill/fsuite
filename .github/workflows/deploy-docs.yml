name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-docs.yml'
      # Rebuild when tool binaries change — gen:commands reads their --help
      - 'fs'
      - 'ftree'
      - 'fls'
      - 'fsearch'
      - 'fcontent'
      - 'fmap'
      - 'fread'
      - 'fedit'
      - 'fwrite'
      - 'fbash'
      - 'fcase'
      - 'freplay'
      - 'fprobe'
      - 'fmetrics'
      - 'fsuite'
      - 'docs/EPISODE-*.md'  # gen:story mirrors these into the site
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Make fsuite tool binaries executable
        run: chmod +x fs ftree fls fsearch fcontent fmap fread fedit fwrite fbash fcase freplay fprobe fmetrics fsuite

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site (gen:commands + gen:story + astro build)
        working-directory: site
        run: |
          node scripts/gen-story.mjs
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
